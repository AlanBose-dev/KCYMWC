<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prediction Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(5,18,32,.88),rgba(5,18,32,.9)),
url("https://images.unsplash.com/photo-1547347298-4074fc3086f0?auto=format&fit=crop&w=1600&q=80");

background-size:cover;
background-position:center;

overflow:hidden;

color:white;

}

body::before{

content:"";

position:absolute;
width:600px;
height:600px;

background:#16c06f33;

border-radius:50%;

filter:blur(150px);

top:-150px;
left:-150px;

animation:float 10s ease-in-out infinite;

}

body::after{

content:"";

position:absolute;
width:500px;
height:500px;

background:#f4c54222;

border-radius:50%;

filter:blur(130px);

bottom:-150px;
right:-150px;

animation:float 12s ease-in-out infinite reverse;

}

@keyframes float{

50%{

transform:translateY(40px);

}

}

.card{

position:relative;

z-index:2;

width:90%;
max-width:520px;

padding:50px 35px;

text-align:center;

border-radius:30px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.15);

box-shadow:0 25px 60px rgba(0,0,0,.4);

}

.ball{

font-size:70px;

display:inline-block;

animation:bounce 1.6s infinite;

}

@keyframes bounce{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-18px);

}

}

h1{

margin-top:25px;

font-size:36px;

font-weight:800;

color:#FFD54A;

letter-spacing:1px;

}

p{

margin-top:20px;

font-size:18px;

line-height:1.8;

color:#efefef;

}

.coming{

margin-top:35px;

font-size:22px;

font-weight:700;

color:#16c06f;

}

.dots::after{

content:"";

animation:dots 2s infinite;

}

@keyframes dots{

0%{content:"";}
25%{content:".";}
50%{content:"..";}
75%{content:"...";}
100%{content:"";}
}

.loader{

margin:30px auto;

width:55px;
height:55px;

border:4px solid rgba(255,255,255,.15);

border-top:4px solid #16c06f;

border-radius:50%;

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

a{

display:inline-block;

margin-top:10px;

padding:15px 38px;

background:#16c06f;

color:white;

text-decoration:none;

font-weight:600;

border-radius:50px;

transition:.3s;

}

a:hover{

transform:translateY(-4px);

background:#12a45e;

box-shadow:0 10px 30px rgba(22,192,111,.4);

}

.footer{

margin-top:35px;

font-size:14px;

opacity:.8;

}

@media(max-width:600px){

.card{

padding:40px 25px;

}

.ball{

font-size:58px;

}

h1{

font-size:28px;

}

p{

font-size:16px;

}

.coming{

font-size:18px;

}

}

</style>

</head>

<body>

<div class="card">

<div class="ball">⚽</div>

<h1>PREDICTION OPENS SOON</h1>

<p>

The prediction window for this match
has not opened yet.

<br><br>

Please check back later.

</p>

<div class="loader"></div>

<div class="coming">

Stay Tuned<span class="dots"></span>

</div>

<a href="index.html">

← Back to Home

</a>

<div class="footer">

KCYM SMYM MATTARA

</div>

</div>

</body>
</html>
